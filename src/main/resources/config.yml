################################################################################
# Logging                                                                      #
################################################################################

#詳細出力 (デフォルト: false) 「true」の場合、コマンドの登録および登録解除のログをコンソールに出力します
verbose-outputs: false

#Silent logs (デフォルト: false) 「true」の場合、CommandAPI からのすべてのログ (エラーを除く) をオフにします。
silent-logs: false

################################################################################
# Messages                                                                     #
################################################################################

#Messages CommandAPI がプレイヤーに表示するメッセージを制御します
messages:

  #Missing executor implementation (デフォルト: "このコマンドには %s の実装がありません")
  #コマンドに executor がない場合に送信者に表示するメッセージ。利用可能なパラメータは次のとおりです:
  #%s - エグゼキュータ クラス (小文字) %S - エグゼキュータ クラス (通常のケース)
  missing-executor-implementation: "このコマンドには %s の実装がありません"

################################################################################
# Debugging                                                                    #
################################################################################

#ディスパッチャ JSON の作成 (デフォルト: false) 「true」の場合、CommandAPI は、登録されたコマンドのマッピングを示す
#command_registration.json ファイルを作成します。これは開発者が使用するように設計されています。
#これを「false」に設定すると、コマンド登録のパフォーマンスが向上します。
create-dispatcher-json: false

#Use latest version (デフォルト: false) 「true」の場合、CommandAPI の使用時に、CommandAPI は利用可能な最新の NMS 実装を使用します。
#これにより、最新の NMS 実装が現在の Minecraft バージョンと実際に互換性があるかどうかを確認するすべてのチェックが回避されます。
use-latest-nms-version: false

################################################################################
# Command conversion                                                           #
################################################################################

#変換するプラグイン (デフォルト: []) コマンド変換のために処理するプラグインのリストを制御します。
plugins-to-convert: []

#変換するその他のコマンド (デフォルト: []) 変換するその他のコマンドのリスト。
#これは、plugin.yml ファイルで宣言されていないコマンドに使用する必要があります。
other-commands-to-convert: []

#送信者プロキシをスキップ (デフォルト: []) コマンドの変換時にプロキシ送信者をスキップするかどうかを決定します。
#プラグイン コマンドの変換に問題がある場合は、このリストにプラグインを追加してください。
skip-sender-proxy: []